version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: bridgingbipolar-postgres
    environment:
      POSTGRES_USER: bridging
      POSTGRES_PASSWORD: bridging
      POSTGRES_DB: bridgingbipolar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
