<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="blueBlob" cx="38%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#4BA3E3" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="orangeBlob" cx="62%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#FFB84D" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFD78C" stop-opacity="0.2"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Watercolor blue blob (left / brain left) -->
  <ellipse cx="78" cy="82" rx="62" ry="58" fill="url(#blueBlob)" filter="url(#blur)"/>
  <!-- Watercolor orange blob (right / brain right) -->
  <ellipse cx="122" cy="82" rx="62" ry="58" fill="url(#orangeBlob)" filter="url(#blur)"/>
  <!-- Bridge arch (main arch) -->
  <path d="M40 130 Q100 48 160 130" stroke="white" stroke-width="7" fill="none" stroke-linecap="round" filter="url(#blur)"/>
  <path d="M40 130 Q100 48 160 130" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- Left pillar -->
  <rect x="43" y="112" width="7" height="24" rx="3.5" fill="white"/>
  <!-- Right pillar -->
  <rect x="150" y="112" width="7" height="24" rx="3.5" fill="white"/>
  <!-- Water reflections -->
  <path d="M35 148 Q100 160 165 148" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M44 158 Q100 167 156 158" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M53 166 Q100 173 147 166" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.2"/>
</svg>
